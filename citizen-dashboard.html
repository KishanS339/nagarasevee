<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Track and manage your reported civic grievances in Bengaluru.">
  <title>My Grievances — NagaraSeva</title>
  <link rel="stylesheet" href="styles/design-system.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/animations.css">
  <style>
    .dashboard-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: var(--space-4);
      margin-bottom: var(--space-7);
    }
    .grievance-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
    }
    .grievance-item {
      display: flex;
      align-items: center;
      gap: var(--space-5);
      padding: var(--space-5) var(--space-6);
      cursor: pointer;
    }
    .grievance-item:hover { border-color: var(--border-accent); }
    .grievance-item .g-icon {
      width: 48px; height: 48px;
      border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; flex-shrink: 0;
    }
    .g-icon.road { background: rgba(213,0,0,0.15); }
    .g-icon.water { background: rgba(0,188,212,0.15); }
    .g-icon.garbage { background: rgba(255,111,0,0.15); }
    .g-icon.light { background: rgba(255,183,77,0.15); }
    .g-icon.drain { background: rgba(48,63,159,0.15); }
    .g-icon.tree { background: rgba(0,200,83,0.15); }
    .g-icon.other { background: rgba(255,255,255,0.08); }
    .grievance-item .g-info { flex: 1; min-width: 0; }
    .grievance-item .g-title {
      font-weight: var(--fw-semibold);
      margin-bottom: var(--space-1);
      display: flex; align-items: center; gap: var(--space-3);
    }
    .grievance-item .g-id {
      font-size: var(--fs-label);
      color: var(--text-on-dark-muted);
      font-weight: var(--fw-regular);
    }
    .grievance-item .g-meta {
      font-size: var(--fs-body-sm);
      color: var(--text-on-dark-secondary);
      display: flex; gap: var(--space-4); flex-wrap: wrap;
    }
    .grievance-item .g-actions {
      display: flex; align-items: center; gap: var(--space-2);
    }
    .view-toggle {
      display: flex;
      background: rgba(255,255,255,0.05);
      border-radius: var(--radius-md);
      overflow: hidden;
    }
    .view-toggle button {
      padding: var(--space-2) var(--space-4);
      background: none; border: none;
      color: var(--text-on-dark-secondary);
      font-family: var(--font-family); font-size: var(--fs-body-sm);
      cursor: pointer; transition: all var(--transition-fast);
    }
    .view-toggle button.active { background: var(--color-accent); color: white; }
    .grid-view { display: none; }
    .grid-view.active {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: var(--space-5);
    }
    .grievance-grid-card { padding: var(--space-5); cursor: pointer; }
    .grievance-grid-card .g-grid-header {
      display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: var(--space-4);
    }
    .grievance-grid-card .g-grid-title {
      font-weight: var(--fw-semibold); font-size: var(--fs-body); margin-bottom: var(--space-2);
    }
    .grievance-grid-card .g-grid-desc {
      font-size: var(--fs-body-sm); color: var(--text-on-dark-secondary);
      margin-bottom: var(--space-4);
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .grievance-grid-card .g-grid-footer {
      display: flex; justify-content: space-between; align-items: center;
      font-size: var(--fs-label); color: var(--text-on-dark-muted);
    }
    .empty-state {
      text-align: center; padding: var(--space-10);
      color: var(--text-on-dark-secondary);
    }
    .empty-state .empty-icon { font-size: 48px; margin-bottom: var(--space-4); }
    .user-greeting { display: flex; align-items: center; gap: var(--space-3); }
    @media (max-width: 768px) {
      .grievance-item { flex-direction: column; align-items: flex-start; }
      .grievance-item .g-actions { width: 100%; justify-content: flex-end; }
    }
  </style>
</head>
<body>
  <nav class="topbar">
    <div class="topbar-inner">
      <a href="index.html" class="topbar-brand">
        <div class="brand-icon">🏛️</div>
        <div class="brand-name">Nagara<span>Seva</span></div>
      </a>
      <div class="topbar-nav">
        <a href="index.html" class="nav-link">Home</a>
        <a href="citizen-dashboard.html" class="nav-link active">My Grievances</a>
        <a href="report-grievance.html" class="nav-link">Report Issue</a>
        <a href="map-view.html" class="nav-link">City Map</a>
      </div>
      <div class="topbar-actions">
        <a href="report-grievance.html" class="btn btn-primary btn-sm">+ Report Issue</a>
        <button class="btn btn-ghost btn-sm" id="logout-btn" style="display:none;" onclick="NagaraSevaAPI.logout()">Logout</button>
        <button class="hamburger" aria-label="Toggle menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </nav>
  <div class="mobile-nav">
    <a href="index.html" class="nav-link">Home</a>
    <a href="citizen-dashboard.html" class="nav-link active">My Grievances</a>
    <a href="report-grievance.html" class="nav-link">Report Issue</a>
    <a href="map-view.html" class="nav-link">City Map</a>
  </div>

  <div class="page">
    <div class="page-content">
      <!-- Summary Stats -->
      <div class="grid-4 mb-8 stagger-children">
        <div class="stat-card accent animate-in">
          <div class="stat-icon">📋</div>
          <div class="stat-value" id="stat-total">—</div>
          <div class="stat-label">Total Filed</div>
        </div>
        <div class="stat-card warning animate-in">
          <div class="stat-icon">⏳</div>
          <div class="stat-value" id="stat-progress">—</div>
          <div class="stat-label">In Progress</div>
        </div>
        <div class="stat-card success animate-in">
          <div class="stat-icon">✅</div>
          <div class="stat-value" id="stat-resolved">—</div>
          <div class="stat-label">Resolved</div>
        </div>
        <div class="stat-card danger animate-in">
          <div class="stat-icon">🔺</div>
          <div class="stat-value" id="stat-escalated">—</div>
          <div class="stat-label">Escalated</div>
        </div>
      </div>

      <!-- Dashboard Header -->
      <div class="dashboard-header animate-in">
        <div>
          <h1 class="text-h1">My Grievances</h1>
          <p class="text-secondary text-body-sm mt-2" id="user-greeting">Track all your reported civic issues</p>
        </div>
        <div class="flex items-center gap-4">
          <div class="search-bar">
            <span class="search-icon">🔍</span>
            <input type="text" placeholder="Search grievances..." id="search-input">
          </div>
          <div class="view-toggle">
            <button class="active" onclick="setView('list')">☰ List</button>
            <button onclick="setView('grid')">⊞ Grid</button>
          </div>
        </div>
      </div>

      <!-- Filter Pills -->
      <div class="filter-pills mb-6 animate-in">
        <button class="filter-pill active" data-status="">All</button>
        <button class="filter-pill" data-status="Open">Open</button>
        <button class="filter-pill" data-status="In Progress">In Progress</button>
        <button class="filter-pill" data-status="Resolved">Resolved</button>
        <button class="filter-pill" data-status="Escalated">Escalated</button>
      </div>

      <!-- List View -->
      <div class="grievance-list list-view" id="list-view">
        <div class="glass-card" style="padding:var(--space-8);text-align:center;">
          <div class="skeleton skeleton-card" style="margin-bottom:var(--space-3);"></div>
          <div class="skeleton skeleton-card" style="margin-bottom:var(--space-3);"></div>
          <div class="skeleton skeleton-card"></div>
        </div>
      </div>
      <!-- Grid View -->
      <div class="grid-view" id="grid-view"></div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/app.js"></script>
  <script>
    const categoryIcons = {
      'Road Damage': { icon: '🚧', cls: 'road' },
      'Water Supply': { icon: '💧', cls: 'water' },
      'Garbage': { icon: '🗑️', cls: 'garbage' },
      'Street Light': { icon: '💡', cls: 'light' },
      'Drainage': { icon: '🌊', cls: 'drain' },
      'Tree Fall': { icon: '🌳', cls: 'tree' }
    };
    const statusBadge = {
      'Open': 'badge-open',
      'In Progress': 'badge-in-progress',
      'Resolved': 'badge-resolved',
      'Escalated': 'badge-escalated',
      'Closed': 'badge-resolved'
    };
    const statusIcon = {
      'Open': '📋', 'In Progress': '⏳', 'Resolved': '✅', 'Escalated': '🔺', 'Closed': '✔️'
    };

    let allGrievances = [];

    function formatDate(d) {
      return new Date(d).toLocaleDateString('en-IN', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function renderList(grievances) {
      const listView = document.getElementById('list-view');
      const gridView = document.getElementById('grid-view');

      if (grievances.length === 0) {
        listView.innerHTML = `<div class="glass-card empty-state"><div class="empty-icon">📭</div><h3>No grievances found</h3><p class="text-secondary mt-2">Report your first civic issue!</p><a href="report-grievance.html" class="btn btn-primary mt-4">+ Report Issue</a></div>`;
        gridView.innerHTML = '';
        return;
      }

      listView.innerHTML = grievances.map(g => {
        const cat = categoryIcons[g.category] || { icon: '📋', cls: 'other' };
        const badge = statusBadge[g.status] || 'badge-open';
        return `
        <div class="glass-card grievance-item hover-lift animate-in" onclick="location.href='grievance-detail.html?id=${g.grievanceId}'">
          <div class="g-icon ${cat.cls}">${cat.icon}</div>
          <div class="g-info">
            <div class="g-title">${g.title}<span class="g-id">${g.grievanceId}</span></div>
            <div class="g-meta">
              <span>📍 ${g.location.address}${g.location.ward ? ', ' + g.location.ward : ''}</span>
              <span>📅 ${formatDate(g.createdAt)}</span>
              <span>🏷️ ${g.category}</span>
            </div>
          </div>
          <span class="badge ${badge}">${statusIcon[g.status] || ''} ${g.status}</span>
          <div class="g-actions"><button class="btn btn-ghost btn-sm">View →</button></div>
        </div>`;
      }).join('');

      gridView.innerHTML = grievances.map(g => {
        const cat = categoryIcons[g.category] || { icon: '📋', cls: 'other' };
        const badge = statusBadge[g.status] || 'badge-open';
        return `
        <div class="glass-card grievance-grid-card hover-lift" onclick="location.href='grievance-detail.html?id=${g.grievanceId}'">
          <div class="g-grid-header">
            <span style="font-size:24px;">${cat.icon}</span>
            <span class="badge ${badge}">${g.status}</span>
          </div>
          <div class="g-grid-title">${g.title}</div>
          <div class="g-grid-desc">${g.description}</div>
          <div class="g-grid-footer">
            <span>${g.grievanceId}</span>
            <span>${formatDate(g.createdAt)}</span>
          </div>
        </div>`;
      }).join('');
    }

    async function loadDashboard() {
      // Check login
      if (!NagaraSevaAPI.isLoggedIn()) {
        window.location.href = '/login.html';
        return;
      }

      const user = NagaraSevaAPI.getUser();
      document.getElementById('user-greeting').textContent = `Welcome back, ${user.name}!`;
      document.getElementById('logout-btn').style.display = '';

      try {
        const data = await NagaraSevaAPI.getMyGrievances();
        allGrievances = data.grievances;

        // Update stats
        document.getElementById('stat-total').textContent = data.stats.total;
        document.getElementById('stat-progress').textContent = data.stats.inProgress;
        document.getElementById('stat-resolved').textContent = data.stats.resolved;
        document.getElementById('stat-escalated').textContent = data.stats.escalated;

        renderList(allGrievances);
      } catch (err) {
        document.getElementById('list-view').innerHTML = `<div class="glass-card empty-state"><div class="empty-icon">⚠️</div><h3>Error loading grievances</h3><p class="text-secondary mt-2">${err.message}</p></div>`;
      }
    }

    // Filter pills
    document.querySelectorAll('.filter-pill').forEach(pill => {
      pill.addEventListener('click', () => {
        document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
        pill.classList.add('active');
        const status = pill.dataset.status;
        const filtered = status ? allGrievances.filter(g => g.status === status) : allGrievances;
        renderList(filtered);
      });
    });

    // Search
    document.getElementById('search-input').addEventListener('input', (e) => {
      const q = e.target.value.toLowerCase();
      const filtered = allGrievances.filter(g =>
        g.title.toLowerCase().includes(q) ||
        g.grievanceId.toLowerCase().includes(q) ||
        g.category.toLowerCase().includes(q) ||
        g.location.address.toLowerCase().includes(q)
      );
      renderList(filtered);
    });

    function setView(view) {
      const listView = document.getElementById('list-view');
      const gridView = document.getElementById('grid-view');
      const toggleBtns = document.querySelectorAll('.view-toggle button');
      toggleBtns.forEach(b => b.classList.remove('active'));
      if (view === 'grid') {
        listView.style.display = 'none';
        gridView.classList.add('active');
        toggleBtns[1].classList.add('active');
      } else {
        listView.style.display = '';
        gridView.classList.remove('active');
        toggleBtns[0].classList.add('active');
      }
    }

    loadDashboard();
  </script>
</body>
</html>
